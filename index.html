<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dark-mode">
    <div class="app-container">
        <section id="home-page" class="page active">
            <header>
                <div class="header-top">
                    <h1>Su Takibi</h1>
                    <button id="theme-toggle">🌓</button>
                </div>
            </header>

            <div class="tracker-wrapper">
                <div class="cup-labels" id="cup-labels">
                    </div>
                <div class="cup-container">
                    <div id="water-level" class="water"></div>
                </div>
                <div class="current-status">
                    <h2 id="current-ml">0</h2>
                    <span>/ <span id="target-display">2000</span> ml</span>
                </div>
            </div>

            <div class="quick-actions">
                <button class="glass-btn" onclick="addWater(200)">+200ml</button>
                <button class="glass-btn" onclick="addWater(330)">+330ml</button>
                <button class="glass-btn" onclick="addWater(500)">+500ml</button>
            </div>
            
            <div class="custom-input-group">
                <input type="number" id="custom-ml" placeholder="Örn: 250">
                <button onclick="addCustomWater()">Ekle</button>
            </div>
        </section>

        <section id="stats-page" class="page">
            <h2>İstatistikler</h2>
            <div class="stats-card" id="stats-display">Veri bekleniyor...</div>
            <button class="danger-btn" id="reset-btn">Verileri Sıfırla</button>
        </section>

        <section id="badges-page" class="page">
            <h2>Rozetlerin</h2>
            <div id="badge-list" class="badge-grid">Henüz rozet yok.</div>
        </section>

        <section id="settings-page" class="page">
            <h2>Hedef Belirle</h2>
            <div class="settings-card">
                <input type="number" id="target-input" value="2000">
                <button class="glass-btn" onclick="updateTarget()">Kaydet</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <button onclick="showPage('home-page')">🏠</button>
            <button onclick="showPage('stats-page')">📊</button>
            <button onclick="showPage('badges-page')">🏆</button>
            <button onclick="showPage('settings-page')">⚙️</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
